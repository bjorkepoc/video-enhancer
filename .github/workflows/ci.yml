name: CI

on:
  push:
  pull_request:

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest

  desktop-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
      - name: Run desktop core tests
        run: dotnet test desktop\VideoEnhancer.Core.Tests\VideoEnhancer.Core.Tests.csproj --configuration Release
      - name: Build desktop player
        run: dotnet build desktop\VideoEnhancer.Player\VideoEnhancer.Player.csproj --configuration Release -p:Platform=x64
